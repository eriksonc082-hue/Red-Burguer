kind = "web"
previewPath = "/"
title = "Red Burguer"
version = "1.0.0"
id = "artifacts/red-burguer"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23406

[services.development]
run = "pnpm --filter @workspace/red-burguer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/red-burguer", "run", "build" ]
serve = "static"
publicDir = "artifacts/red-burguer/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23406"
BASE_PATH = "/"
